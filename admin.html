<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corea Elite - 관리자 대시보드</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { background-color: #0b0914; color: #e2daf0; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background-color: #141023; border-right: 1px solid rgba(255, 255, 255, 0.05); padding: 20px 0; }
        .brand { padding: 0 20px 20px; font-size: 1.4rem; font-weight: 900; background: linear-gradient(45deg, #ff4e50, #f9d423); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 20px; }
        .nav-menu { list-style: none; padding: 0 10px; }
        .nav-link { display: flex; align-items: center; padding: 12px 20px; color: #8c82a6; text-decoration: none; border-radius: 8px; font-weight: 600; }
        .nav-link.active { background-color: rgba(255, 117, 140, 0.1); color: #ff758c; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .table-container { background-color: #1a1530; border-radius: 16px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; color: #8c82a6; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        td { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.02); }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .status-new { background: rgba(255, 117, 140, 0.2); color: #ff758c; }
        .status-contacted { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .action-btn { background: none; border: none; color: #8c82a6; cursor: pointer; font-size: 1.1rem; margin-right: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">COREA ADMIN</div>
        <ul class="nav-menu">
            <li><a href="#" class="nav-link active"><i class="fas fa-home"></i> 대시보드</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header"><h1>실시간 매칭 신청 현황 (DB Connected)</h1></header>
        <div class="table-container">
            <table id="leadsTable">
                <thead>
                    <tr>
                        <th>ID</th><th>신청 일시</th><th>이름</th><th>연령대</th><th>거주 지역</th><th>이상형</th><th>상태</th><th>관리</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="8" style="text-align:center;">데이터를 불러오는 중입니다...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // 初始化 Supabase
        const supabase = supabase.createClient(
            'https://hbsywlpnxbjpgrskpohk.supabase.co', 
            'sb_publishable_PIuyV1_XZYUG3J3Se1mo-w_wruyURVG'
        );

        async function fetchLeads() {
            const { data, error } = await supabase
                .from('leads')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("加载错误:", error);
                return;
            }
            renderTable(data);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: #ff758c; font-weight: bold;">#${row.id}</td>
                    <td>${row.created_at ? row.created_at.replace('T', ' ').substring(0, 16) : '-'}</td>
                    <td style="font-weight: bold; color: #fff;">${row.name}</td>
                    <td>${row.age}</td>
                    <td>${row.address}</td>
                    <td style="color: #f9d423;">${row.type}</td>
                    <td>${row.status === 'new' ? '<span class="status-badge status-new">신규 접수</span>' : '<span class="status-badge status-contacted">입장 완료</span>'}</td>
                    <td>
                        <button class="action-btn"><i class="fab fa-line" style="color: #06C755;"></i></button>
                        <button class="action-btn"><i class="fab fa-telegram" style="color: #26A5E4;"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.onload = () => {
            fetchLeads();
            setInterval(fetchLeads, 10000); // 实时刷新
        };
    </script>
</body>
</html>
